<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160"
     role="img" aria-label="copilot-omni mark">
  <title>copilot-omni mark</title>
  <defs>
    <linearGradient id="m-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="m-soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <radialGradient id="m-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g transform="translate(80, 80)">
    <circle cx="0" cy="0" r="76" fill="url(#m-glow)"/>

    <ellipse cx="0" cy="0" rx="62" ry="62" fill="none"
             stroke="url(#m-accent)" stroke-width="3" opacity="0.95"/>
    <ellipse cx="0" cy="0" rx="62" ry="22" fill="none"
             stroke="url(#m-soft)" stroke-width="2.5" opacity="0.75"
             transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="62" ry="22" fill="none"
             stroke="url(#m-soft)" stroke-width="2.5" opacity="0.75"
             transform="rotate(-60)"/>

    <circle cx="0"     cy="-62" r="7" fill="#8b5cf6"/>
    <circle cx="53.7"  cy="31"  r="7" fill="#6366f1"/>
    <circle cx="-53.7" cy="31"  r="7" fill="#d946ef"/>
    <circle cx="0"     cy="62"  r="5" fill="#a78bfa" opacity="0.9"/>
    <circle cx="53.7"  cy="-31" r="5" fill="#818cf8" opacity="0.9"/>
    <circle cx="-53.7" cy="-31" r="5" fill="#e879f9" opacity="0.9"/>

    <path d="M -18 14 L 0 -20 L 18 14 L 0 3 Z"
          fill="url(#m-accent)" stroke="#ffffff" stroke-width="0.75" stroke-opacity="0.35"/>
  </g>
</svg>
