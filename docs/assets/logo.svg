<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="200" rx="16" fill="#0f1117"/>

  <!-- Icon: Workflow diamond/hexagon with nodes -->
  <g transform="translate(48, 100)" filter="url(#shadow)">
    <!-- Central hexagon -->
    <polygon points="0,-42 36,-21 36,21 0,42 -36,21 -36,-21" fill="url(#grad1)" opacity="0.9"/>
    <!-- Inner circle (omni/core) -->
    <circle cx="0" cy="0" r="16" fill="#0f1117" opacity="0.4"/>
    <circle cx="0" cy="0" r="10" fill="url(#grad2)"/>

    <!-- Orbiting workflow nodes -->
    <circle cx="0" cy="-42" r="6" fill="#818cf8"/>
    <circle cx="36" cy="-21" r="5" fill="#a78bfa"/>
    <circle cx="36" cy="21" r="5" fill="#818cf8"/>
    <circle cx="0" cy="42" r="6" fill="#a78bfa"/>
    <circle cx="-36" cy="21" r="5" fill="#818cf8"/>
    <circle cx="-36" cy="-21" r="5" fill="#a78bfa"/>

    <!-- Connection lines (workflow paths) -->
    <line x1="0" y1="-36" x2="30" y2="-18" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="-18" x2="30" y2="18" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="18" x2="0" y2="36" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="36" x2="-30" y2="18" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="-30" y1="18" x2="-30" y2="-18" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="-30" y1="-18" x2="0" y2="-36" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>

    <!-- Center to nodes connections -->
    <line x1="0" y1="-10" x2="0" y2="-36" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <line x1="9" y1="-5" x2="30" y2="-18" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <line x1="9" y1="5" x2="30" y2="18" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="10" x2="0" y2="36" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <line x1="-9" y1="5" x2="-30" y2="18" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <line x1="-9" y1="-5" x2="-30" y2="-18" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Text: Copilot Omni -->
  <text x="120" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0" letter-spacing="-1">
    Copilot
    <tspan fill="url(#grad2)">Omni</tspan>
  </text>

  <!-- Tagline -->
  <text x="122" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8" letter-spacing="0.5">
    Enterprise-safe, artifact-driven workflows for GitHub Copilot CLI
  </text>

  <!-- Phase indicators (6 phases as small dots) -->
  <g transform="translate(122, 148)">
    <circle cx="0" cy="0" r="4" fill="#6366f1"/>
    <line x1="6" y1="0" x2="28" y2="0" stroke="#4f46e5" stroke-width="1.5" opacity="0.5"/>
    <circle cx="34" cy="0" r="4" fill="#7c3aed"/>
    <line x1="40" y1="0" x2="62" y2="0" stroke="#6d28d9" stroke-width="1.5" opacity="0.5"/>
    <circle cx="68" cy="0" r="4" fill="#8b5cf6"/>
    <line x1="74" y1="0" x2="96" y2="0" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
    <circle cx="102" cy="0" r="4" fill="#a78bfa"/>
    <line x1="108" y1="0" x2="130" y2="0" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <circle cx="136" cy="0" r="4" fill="#c4b5fd"/>
    <line x1="142" y1="0" x2="164" y2="0" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <circle cx="170" cy="0" r="4" fill="#ddd6fe"/>

    <text x="185" y="4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#64748b">
      discuss → spec → plan → review → execute → verify
    </text>
  </g>
</svg>
