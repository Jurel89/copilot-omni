<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200"
     role="img" aria-label="copilot-omni — artifact-driven multi-agent orchestration for GitHub Copilot CLI">
  <title>copilot-omni</title>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="accentSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Mark: three orbits + pilot arrow core -->
  <g transform="translate(110, 100)" filter="url(#softShadow)">
    <!-- ambient glow -->
    <circle cx="0" cy="0" r="78" fill="url(#glow)"/>

    <!-- outer orbit (horizontal) -->
    <ellipse cx="0" cy="0" rx="62" ry="62" fill="none"
             stroke="url(#accent)" stroke-width="2.5" opacity="0.95"/>
    <!-- tilted orbits -->
    <ellipse cx="0" cy="0" rx="62" ry="22" fill="none"
             stroke="url(#accentSoft)" stroke-width="2" opacity="0.75"
             transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="62" ry="22" fill="none"
             stroke="url(#accentSoft)" stroke-width="2" opacity="0.75"
             transform="rotate(-60)"/>

    <!-- agent nodes on orbit intersections -->
    <circle cx="0"    cy="-62" r="6.5" fill="#8b5cf6"/>
    <circle cx="53.7" cy="31"  r="6.5" fill="#6366f1"/>
    <circle cx="-53.7" cy="31" r="6.5" fill="#d946ef"/>
    <circle cx="0"    cy="62"  r="4.5" fill="#a78bfa" opacity="0.9"/>
    <circle cx="53.7" cy="-31" r="4.5" fill="#818cf8" opacity="0.9"/>
    <circle cx="-53.7" cy="-31" r="4.5" fill="#e879f9" opacity="0.9"/>

    <!-- pilot arrow core (stylised caret / copilot glyph) -->
    <path d="M -16 12 L 0 -18 L 16 12 L 0 2 Z"
          fill="url(#accent)" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <text x="215" y="98" font-size="56" font-weight="800" letter-spacing="-2" fill="#475569">
      copilot<tspan fill="url(#accent)">-omni</tspan>
    </text>

    <text x="217" y="132" font-size="16" font-weight="500" fill="#64748b" letter-spacing="0.2">
      Artifact-driven multi-agent orchestration for GitHub Copilot CLI
    </text>

    <!-- pipeline ribbon -->
    <g transform="translate(217, 164)">
      <line x1="5"   y1="0" x2="85"  y2="0" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
      <line x1="95"  y1="0" x2="175" y2="0" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
      <line x1="185" y1="0" x2="265" y2="0" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
      <line x1="275" y1="0" x2="355" y2="0" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
      <circle cx="0"   cy="0" r="4.5" fill="#6366f1"/>
      <circle cx="90"  cy="0" r="4.5" fill="#7c3aed"/>
      <circle cx="180" cy="0" r="4.5" fill="#8b5cf6"/>
      <circle cx="270" cy="0" r="4.5" fill="#a855f7"/>
      <circle cx="360" cy="0" r="4.5" fill="#d946ef"/>
      <text x="-4"  y="18" font-size="10.5" fill="#94a3b8" letter-spacing="1.3">DISCUSS</text>
      <text x="76"  y="18" font-size="10.5" fill="#94a3b8" letter-spacing="1.3">PLAN</text>
      <text x="160" y="18" font-size="10.5" fill="#94a3b8" letter-spacing="1.3">EXECUTE</text>
      <text x="251" y="18" font-size="10.5" fill="#94a3b8" letter-spacing="1.3">VERIFY</text>
      <text x="346" y="18" font-size="10.5" fill="#94a3b8" letter-spacing="1.3">SHIP</text>
    </g>
  </g>
</svg>
