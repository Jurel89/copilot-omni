<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1c2e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="url(#bgGrad)"/>
  
  <!-- Grid dots for texture -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.5" fill="#334155" opacity="0.5"/>
  </pattern>
  <rect width="800" height="520" fill="url(#dots)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0" text-anchor="middle" letter-spacing="2">ARCHITECTURE</text>

  <!-- ===== LAYER 1: User (top) ===== -->
  <g filter="url(#shadow)">
    <rect x="280" y="60" width="240" height="50" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="400" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0" text-anchor="middle">Developer Terminal</text>
  </g>

  <!-- Arrow: User → Wrapper -->
  <line x1="400" y1="110" x2="400" y2="138" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs>

  <!-- ===== LAYER 2: Wrapper CLI ===== -->
  <g filter="url(#shadow)">
    <rect x="260" y="140" width="280" height="60" rx="10" fill="#1e293b" stroke="url(#blueGrad)" stroke-width="1.5"/>
    <text x="400" y="165" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700" fill="#818cf8" text-anchor="middle">omni CLI (Wrapper)</text>
    <text x="400" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">init · doctor · run · status · version</text>
  </g>

  <!-- Arrow: Wrapper → Sidecar -->
  <line x1="400" y1="200" x2="400" y2="238" stroke="url(#purpleGrad)" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="425" y="224" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#8b5cf6">stdio/MCP</text>
  <defs><marker id="arrowPurple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/></marker></defs>

  <!-- ===== LAYER 3: Sidecar MCP Server ===== -->
  <g filter="url(#shadow)">
    <rect x="160" y="240" width="480" height="80" rx="12" fill="#1e1b4b" fill-opacity="0.6" stroke="url(#purpleGrad)" stroke-width="2"/>
    <text x="400" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="700" fill="#c4b5fd" text-anchor="middle">omni-sidecar (MCP Server)</text>
    <text x="400" y="288" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">31 MCP Tools · JSON-RPC · stdio transport</text>
    <text x="400" y="306" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle">artifact · run · memory · policy · research · benchmark · migration · support</text>
  </g>

  <!-- Arrows: Sidecar → Internal Packages -->
  <line x1="260" y1="320" x2="180" y2="368" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="400" y1="320" x2="400" y2="368" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="540" y1="320" x2="620" y2="368" stroke="#ec4899" stroke-width="1.5" marker-end="url(#arrowPink)"/>
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ec4899"/></marker>
  </defs>

  <!-- ===== LAYER 4: Internal Packages ===== -->
  <!-- Memory Store -->
  <g filter="url(#shadow)">
    <rect x="50" y="370" width="180" height="70" rx="8" fill="#0c4a6e" fill-opacity="0.4" stroke="#10b981" stroke-width="1"/>
    <text x="140" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#34d399" text-anchor="middle">Memory Store</text>
    <text x="140" y="412" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">SQLite · Search · Retention</text>
    <text x="140" y="427" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">Capture · Ingest · Export</text>
  </g>

  <!-- Policy Engine -->
  <g filter="url(#shadow)">
    <rect x="290" y="370" width="220" height="70" rx="8" fill="#451a03" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1"/>
    <text x="400" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">Policy Engine</text>
    <text x="400" y="412" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#fcd34d" text-anchor="middle">Guards · Scope Enforcement</text>
    <text x="400" y="427" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#fde68a" text-anchor="middle">Injection Detection · Protected Paths</text>
  </g>

  <!-- Execution & Artifacts -->
  <g filter="url(#shadow)">
    <rect x="570" y="370" width="180" height="70" rx="8" fill="#500724" fill-opacity="0.4" stroke="#ec4899" stroke-width="1"/>
    <text x="660" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#f472b6" text-anchor="middle">Artifact Store</text>
    <text x="660" y="412" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#f9a8d4" text-anchor="middle">Runs · Specs · Plans</text>
    <text x="660" y="427" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#fbcfe8" text-anchor="middle">Decisions · Transcripts</text>
  </g>

  <!-- ===== LAYER 5: Plugin Layer (bottom) ===== -->
  <g filter="url(#shadow)">
    <rect x="50" y="465" width="700" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="140" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">5 Agents</text>
    <text x="280" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">8 Skills</text>
    <text x="420" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">3 Profiles</text>
    <text x="560" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Policy Packs</text>
    <text x="680" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Templates</text>
  </g>

  <!-- Arrows: Internal → Plugin -->
  <line x1="140" y1="440" x2="140" y2="465" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="440" x2="400" y2="465" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="660" y1="440" x2="660" y2="465" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
