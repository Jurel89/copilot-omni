[pytest]
# WS10: pytest configuration with marker registration and defaults.
testpaths = tests
# Exclude the local-only Copilot CLI installer smoke from the default run:
# it attempts to install @github/copilot via npm and logs in, which is
# unsafe for contributors and CI. Run it explicitly with
#   pytest -m integration_local
# when you want to exercise the real installer on your machine.
addopts = -ra -m "not integration_local"

# ---------------------------------------------------------------------------
# Custom markers
# ---------------------------------------------------------------------------
markers =
    tmux: tests that require a live tmux session (skip in CI without tmux)
    slow: tests with significant wall-clock time (>5 s)
    e2e: end-to-end tests that spawn real subprocesses or external services
    integration: integration tests crossing multiple internal modules
    integration_local: local-only Copilot CLI + plugin install smoke (NEVER runs in CI)

# ---------------------------------------------------------------------------
# Warning filters
# ---------------------------------------------------------------------------
filterwarnings =
    # Suppress deprecation noise from stdlib internals on Python 3.12+
    ignore::DeprecationWarning:importlib._bootstrap
    ignore::PendingDeprecationWarning
