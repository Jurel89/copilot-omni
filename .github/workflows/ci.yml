name: CI

on:
  push:
    branches: [main, "phase-b/**", "refactor/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint & contract validator
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Compile all Python files
        run: |
          python - <<'PY'
          import py_compile, pathlib, sys
          fail = False
          for p in pathlib.Path('.').rglob('*.py'):
              if '.git' in p.parts:
                  continue
              try:
                  py_compile.compile(str(p), doraise=True)
              except py_compile.PyCompileError as e:
                  print('FAIL', p, e); fail = True
          sys.exit(1 if fail else 0)
          PY
      - name: Validate JSON manifests
        run: |
          python -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          python -c "import json; json.load(open('.mcp.json'))"
          python -c "import json; json.load(open('hooks/hooks.json'))"
          python -c "import json; json.load(open('policies/standard.json'))"
          python -c "import json; json.load(open('policies/strict.json'))"
          python -c "import json; json.load(open('policies/permissive.json'))"
      - name: No Go files left behind
        run: |
          LEFTOVERS=$(find . -type f \( -name '*.go' -o -name 'go.mod' -o -name 'go.sum' \) ! -path './.git/*' | wc -l)
          test "$LEFTOVERS" = "0" || { echo "Go leftovers:"; find . -type f \( -name '*.go' -o -name 'go.mod' -o -name 'go.sum' \) ! -path './.git/*'; exit 1; }
      - name: Run plugin contract validator (--all, cap-based)
        run: python3 scripts/verify_plugin_contract.py --all
      - name: Report validator in strict mode (non-blocking)
        continue-on-error: true
        run: python3 scripts/verify_plugin_contract.py --all-strict

  unit-tests:
    name: unit tests (ubuntu / py ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install pytest
        run: python3 -m pip install --quiet pytest
      - name: Run pytest suite
        run: python3 -m pytest -q

  mcp-smoke:
    name: MCP stdio smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: JSON-RPC roundtrip
        run: python scripts/mcp_smoke.py

  discovery-smoke:
    name: Plugin discovery smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Discovery layout
        run: python3 scripts/discovery_smoke.py --probe layout
      - name: Discovery all (offline)
        run: python3 scripts/discovery_smoke.py --probe all --offline

  copilot-smoke:
    name: Copilot CLI plugin install (best-effort)
    runs-on: ubuntu-latest
    needs: [lint, mcp-smoke, discovery-smoke]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Attempt Copilot CLI install
        run: |
          npm install -g @github/copilot || echo "Copilot CLI install skipped (beta npm package)"
          which copilot || echo "copilot CLI not on PATH — smoke test will skip"
      - name: Offline plugin discovery assertion
        run: python scripts/discovery_smoke.py

  coverage:
    name: per-module coverage gate (WS10)
    runs-on: ubuntu-latest
    # Linux py3.11 only — coverage is a dev-dep, not in the default matrix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps (pytest + coverage)
        run: python3 -m pip install --quiet pytest coverage
      - name: Run coverage check
        run: python3 scripts/measure_coverage.py --check
